name: Deploy Mini App to GitHub Pages
on:
  push:
    branches: [main]
    paths:
      - "apps/miniapp/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Версию pnpm берём из package.json (поле packageManager) — не дублируем здесь,
      # иначе action падает с ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false

      # @tpc/shared должен быть собран до фронта (типы/формула уровней).
      - run: pnpm --filter @tpc/shared build

      - name: Build Mini App
        env:
          # Подпапка проекта на Pages: https://<user>.github.io/<repo>/
          VITE_BASE: /${{ github.event.repository.name }}/
          # URL бэкенда, ВКЛЮЧАЯ /api. Задаётся в Settings → Secrets and variables → Actions → Variables.
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: pnpm --filter @tpc/miniapp build

      # SPA-fallback на случай прямого захода/refresh.
      - run: cp apps/miniapp/dist/index.html apps/miniapp/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/miniapp/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
